# ============================================
# Universal Secret Manager Configuration
# ============================================
# Complete configuration reference with all available options.
# Uncomment and customize based on your requirements.

secrets:
  # Enable/disable the entire library (default: true)
  enabled: true

  # Provider fallback chain order
  # Providers are tried in this order until a secret is found
  # Options: aws, gcp, local
  provider-order:
    - aws
    - gcp
    - local

  # Fail application startup if a secret is not found (default: true)
  # If false, secrets with no defaultValue will cause runtime errors
  fail-on-missing: true

  # ============================================
  # AWS Secrets Manager Configuration
  # ============================================
  aws:
    # Enable AWS Secrets Manager provider (default: false)
    enabled: false

    # AWS region (optional)
    # If not specified, uses AWS SDK default region resolution:
    # 1. AWS_REGION environment variable
    # 2. ~/.aws/config
    # 3. EC2 instance metadata
    # region: us-east-1

    # Custom endpoint for LocalStack or testing (optional)
    # Example for LocalStack: http://localhost:4566
    # endpoint: http://localhost:4566

  # ============================================
  # GCP Secret Manager Configuration
  # ============================================
  gcp:
    # Enable GCP Secret Manager provider (default: false)
    enabled: false

    # GCP project ID (optional)
    # If not specified, uses Application Default Credentials (ADC)
    # project-id: my-gcp-project

    # Default version for secrets (default: latest)
    # Can be overridden per-secret using @SecretValue(version = "...")
    default-version: latest

  # ============================================
  # Local Provider Configuration
  # ============================================
  # Useful for development and testing without cloud providers
  local:
    # Enable local provider (default: false)
    enabled: false

    # Define secrets as key-value pairs
    # Supports both simple strings and JSON values
    secrets:
      # Simple string secrets
      # database-password: dev-password-123
      # api-key: dev-api-key-xyz

      # JSON secrets (for field extraction with @SecretValue(field = "..."))
      # api-config: '{"apiKey": "dev-key", "apiSecret": "dev-secret", "endpoint": "https://api.dev.example.com"}'
      # database-config: '{"host": "localhost", "port": 5432, "username": "dev", "password": "dev-pass"}'

  # ============================================
  # Cache Configuration
  # ============================================
  cache:
    # Enable secret caching (default: true)
    # Caching reduces provider API calls and improves performance
    enabled: true

    # Time-to-live for cached secrets (default: 5m)
    # Supports: ms, s, m, h, d (e.g., 30s, 5m, 1h)
    ttl: 5m

    # Maximum number of cached entries (default: 1000)
    # LRU eviction policy when limit is reached
    max-size: 1000

  # ============================================
  # Retry Configuration
  # ============================================
  retry:
    # Maximum retry attempts per provider (default: 3)
    # Retries are only attempted for transient errors (retryable = true)
    max-attempts: 3

    # Initial delay before first retry (default: 1s)
    # Supports: ms, s, m, h (e.g., 500ms, 1s, 2s)
    initial-delay: 1s

    # Exponential backoff multiplier (default: 2.0)
    # Delay formula: initialDelay * (multiplier ^ attemptNumber)
    # Example: 1s, 2s, 4s, 8s...
    multiplier: 2.0

    # Maximum delay between retries (default: 10s)
    # Caps the exponential backoff to prevent excessive wait times
    max-delay: 10s

# ============================================
# Spring Profiles Examples
# ============================================
# Use Spring profiles to configure different providers per environment

---
# Development profile - use local provider
spring:
  config:
    activate:
      on-profile: dev

secrets:
  provider-order:
    - local
  local:
    enabled: true
    secrets:
      database-password: dev-password
      api-key: dev-api-key

---
# Staging profile - use AWS with fallback to local
spring:
  config:
    activate:
      on-profile: staging

secrets:
  provider-order:
    - aws
    - local
  aws:
    enabled: true
    region: us-east-1
  local:
    enabled: true
    secrets:
      fallback-key: fallback-value

---
# Production profile - use AWS only
spring:
  config:
    activate:
      on-profile: prod

secrets:
  provider-order:
    - aws
  aws:
    enabled: true
    region: us-east-1
  fail-on-missing: true
  cache:
    enabled: true
    ttl: 10m
    max-size: 5000

---
# Multi-cloud profile - use both AWS and GCP
spring:
  config:
    activate:
      on-profile: multi-cloud

secrets:
  provider-order:
    - aws
    - gcp
  aws:
    enabled: true
    region: us-east-1
  gcp:
    enabled: true
    project-id: my-gcp-project

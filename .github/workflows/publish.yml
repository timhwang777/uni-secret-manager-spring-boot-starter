name: Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests and checks
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Set release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting version to $VERSION"
          ./mvnw versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      # Uses the 'github' Maven profile defined in pom.xml for distributionManagement.
      # See pom.xml <profiles> section for all available publish targets.
      - name: Publish to GitHub Packages
        run: ./mvnw deploy -Pgithub --batch-mode --no-transfer-progress -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger JitPack build
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s "https://jitpack.io/api/builds/com.github.timhwang777/uni-secret-manager-spring/main-SNAPSHOT" || true
